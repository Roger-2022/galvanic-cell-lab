<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ PASSWORD AUTH (SHA-256 hash comparison) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// Password is stored as SHA-256 hash only вҖ” plaintext never appears in source
const _h = '7242b6f4c20a365dacea8e288f584e145db6cb57fb1472c49e7cf8db260a71e4';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const pwd = document.getElementById('pwdInput').value;
  if (!pwd) { document.getElementById('loginError').textContent = 'иҜ·иҫ“е…ҘеҜҶз Ғ'; return; }

  const hash = await sha256(pwd);
  if (hash === _h) {
    sessionStorage.setItem('_auth', '1');
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.add('visible');
    refreshDashboard();
  } else {
    document.getElementById('loginError').textContent = 'еҜҶз Ғй”ҷиҜҜпјҢиҜ·йҮҚиҜ•';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

// Check if already authenticated in this session
if (sessionStorage.getItem('_auth') === '1') {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.add('visible');
}

document.getElementById('pwdInput').focus();

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ CONFIG в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let config = { maxAttempts: 5, cooldownSeconds: 30, totalGroups: 15 };
const savedConfig = localStorage.getItem('galvanic_lab_config');
if (savedConfig) Object.assign(config, JSON.parse(savedConfig));

document.getElementById('cfgMaxAttempts').value = config.maxAttempts;
document.getElementById('cfgCooldown').value = config.cooldownSeconds;
document.getElementById('cfgGroups').value = config.totalGroups;

function toggleConfig() { document.getElementById('configPanel').classList.toggle('visible'); }

function saveConfig() {
  config.maxAttempts = parseInt(document.getElementById('cfgMaxAttempts').value) || 5;
  config.cooldownSeconds = parseInt(document.getElementById('cfgCooldown').value) || 30;
  config.totalGroups = parseInt(document.getElementById('cfgGroups').value) || 15;
  localStorage.setItem('galvanic_lab_config', JSON.stringify(config));
  document.getElementById('configPanel').classList.remove('visible');
  refreshDashboard();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ DATA (server + localStorage hybrid) в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const API_BASE = window.location.origin;
let useServer = false;
let serverGroups = {};
fetch(API_BASE + '/api/config').then(r => { if (r.ok) useServer = true; }).catch(() => {});

function getGroupData(id) {
  // Prefer server data if available
  if (useServer && serverGroups[id]) return serverGroups[id];
  const d = localStorage.getItem(`galvanic_lab_group_${id}`);
  return d ? JSON.parse(d) : { attempts: [], attemptsUsed: 0, success: false };
}

// Periodically fetch all groups from server
async function syncFromServer() {
  if (!useServer) return;
  try {
    const res = await fetch(API_BASE + '/api/groups');
    if (res.ok) {
      const data = await res.json();
      serverGroups = data.groups || {};
    }
  } catch {}
  try {
    const res = await fetch(API_BASE + '/api/questions');
    if (res.ok) {
      const qs = await res.json();
      if (qs.length > 0) localStorage.setItem('galvanic_questions', JSON.stringify(qs));
    }
  } catch {}
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ DASHBOARD в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function refreshDashboard() {
  const grid = document.getElementById('groupsGrid');
  grid.innerHTML = '';

  let started = 0, success = 0, failed = 0, active = 0;
  let totalAttempts = 0, attemptedGroups = 0;
  document.getElementById('statTotal').textContent = config.totalGroups;

  for (let i = 1; i <= config.totalGroups; i++) {
    const data = getGroupData(i);
    let statusText = 'жңӘејҖе§Ӣ', statusClass = 'status-idle', cardClass = 'inactive';

    if (data.attemptsUsed > 0) {
      started++; attemptedGroups++; totalAttempts += data.attemptsUsed;
      if (data.success) {
        success++; statusText = 'е·ІжҲҗеҠҹ'; statusClass = 'status-success'; cardClass = 'success';
      } else if (data.attemptsUsed >= config.maxAttempts) {
        failed++; statusText = 'е·ІеӨұиҙҘ'; statusClass = 'status-failed'; cardClass = 'failed';
      } else {
        active++; statusText = `иҝӣиЎҢдёӯ (${data.attemptsUsed}/${config.maxAttempts})`; statusClass = 'status-active'; cardClass = '';
      }
    }

    let progressDots = '';
    for (let j = 0; j < config.maxAttempts; j++) {
      if (j < data.attemptsUsed) {
        progressDots += `<div class="progress-dot ${data.success && j === data.attemptsUsed - 1 ? 'success' : 'used'}"></div>`;
      } else {
        progressDots += '<div class="progress-dot"></div>';
      }
    }

    let lastInfo = '<span style="opacity:0.4">жҡӮж— и®°еҪ•</span>';
    if (data.attempts.length > 0) {
      const last = data.attempts[data.attempts.length - 1];
      lastInfo = `${last.negName} | ${last.posName} | ${last.solName}`;
    }

    const card = document.createElement('div');
    card.className = `group-card ${cardClass}`;
    card.innerHTML = `
      <div class="group-card-header">
        <div class="group-card-id">з¬¬ ${i} з»„</div>
        <div class="group-card-status ${statusClass}">${statusText}</div>
      </div>
      <div class="group-card-progress">${progressDots}</div>
      <div class="group-card-attempts">е·Іе°қиҜ• ${data.attemptsUsed} / ${config.maxAttempts} ж¬Ў</div>
      <div class="group-card-last">${lastInfo}</div>
      <div class="group-card-actions">
        <button class="group-action-btn" onclick="showDetail(${i})">жҹҘзңӢиҜҰжғ…</button>
        <button class="group-action-btn" onclick="resetGroup(${i})">йҮҚзҪ®</button>
      </div>
    `;
    grid.appendChild(card);
  }

  document.getElementById('statStarted').textContent = started;
  document.getElementById('statSuccess').textContent = success;
  document.getElementById('statFailed').textContent = failed;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statAvgAttempts').textContent = attemptedGroups > 0 ? (totalAttempts / attemptedGroups).toFixed(1) : 'вҖ”';
  document.getElementById('statRate').textContent = started > 0 ? Math.round((success / started) * 100) + '%' : 'вҖ”';
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ ACTIONS в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function resetGroup(id) {
  if (!confirm(`зЎ®и®ӨйҮҚзҪ®з¬¬ ${id} з»„пјҹ`)) return;
  localStorage.removeItem(`galvanic_lab_group_${id}`);
  if (useServer) fetch(API_BASE+'/api/group/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}).catch(()=>{});
  refreshDashboard();
}

function resetAllGroups() {
  if (!confirm('зЎ®и®ӨйҮҚзҪ®жүҖжңүе°Ҹз»„пјҹ')) return;
  for (let i = 1; i <= config.totalGroups; i++) localStorage.removeItem(`galvanic_lab_group_${i}`);
  if (useServer) fetch(API_BASE+'/api/group/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({all:true})}).catch(()=>{});
  serverGroups = {};
  refreshDashboard();
}

function clearAllData() {
  if (!confirm('зЎ®и®Өжё…йҷӨжүҖжңүж•°жҚ®е’Ңи®ҫзҪ®пјҹдёҚеҸҜж’Өй”ҖгҖӮ')) return;
  for (let i = 1; i <= 30; i++) localStorage.removeItem(`galvanic_lab_group_${i}`);
  localStorage.removeItem('galvanic_lab_config');
  if (useServer) {
    fetch(API_BASE+'/api/group/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({all:true})}).catch(()=>{});
    fetch(API_BASE+'/api/questions',{method:'DELETE'}).catch(()=>{});
  }
  location.reload();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ DETAIL MODAL в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function showDetail(id) {
  const data = getGroupData(id);
  document.getElementById('modalTitle').textContent = `з¬¬ ${id} з»„ В· иҜҰз»Ҷи®°еҪ•`;
  const body = document.getElementById('modalBody');

  if (data.attempts.length === 0) {
    body.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:2rem;">е°ҡжңӘејҖе§Ӣе®һйӘҢ</div>';
  } else {
    body.innerHTML = data.attempts.map((a, idx) => `
      <div class="modal-attempt ${a.success ? 'success' : ''}">
        <div class="attempt-header">
          <span>з¬¬ ${idx + 1} ж¬Ўе°қиҜ•</span>
          <span style="color:${a.success ? 'var(--green)' : 'var(--red)'}">${a.success ? 'жҲҗеҠҹ' : 'еӨұиҙҘ'}</span>
        </div>
        <div style="color:var(--text-dim);margin-bottom:0.3rem;">иҙҹжһҒпјҡ${a.negName} | жӯЈжһҒпјҡ${a.posName} | жә¶ж¶Іпјҡ${a.solName}</div>
        <div style="color:var(--gold);font-size:0.78rem;">${a.feedback}</div>
      </div>
    `).join('');
  }
  document.getElementById('modalOverlay').classList.add('visible');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('visible');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ EXPORT EXCEL в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function exportExcel() {
  // Sheet 1: Summary per group вҖ” includes ALL attempts (success + failures)
  const summaryData = [['з»„еҸ·', 'жңҖз»ҲзҠ¶жҖҒ', 'жҖ»е°қиҜ•ж¬Ўж•°', 'е°қиҜ•еәҸеҸ·', 'з»“жһң', 'иҙҹжһҒжқҗж–ҷ', 'жӯЈжһҒжқҗж–ҷ', 'з”өи§ЈиҙЁжә¶ж¶І', 'еӨұиҙҘеҺҹеӣ ', 'ж—¶й—ҙ']];

  for (let i = 1; i <= config.totalGroups; i++) {
    const data = getGroupData(i);
    let status = 'жңӘејҖе§Ӣ';
    if (data.success) status = 'жҲҗеҠҹ';
    else if (data.attemptsUsed >= config.maxAttempts) status = 'еӨұиҙҘпјҲз”Ёе°Ҫж¬Ўж•°пјү';
    else if (data.attemptsUsed > 0) status = 'иҝӣиЎҢдёӯ';

    if (data.attempts.length === 0) {
      summaryData.push([`з¬¬${i}з»„`, status, 0, 'вҖ”', 'вҖ”', 'вҖ”', 'вҖ”', 'вҖ”', 'вҖ”', 'вҖ”']);
    } else {
      data.attempts.forEach((a, idx) => {
        summaryData.push([
          `з¬¬${i}з»„`,
          idx === 0 ? status : '', // only show status on first row
          idx === 0 ? data.attemptsUsed : '',
          `з¬¬${idx+1}ж¬Ў`,
          a.success ? 'жҲҗеҠҹ' : 'еӨұиҙҘ',
          a.negName,
          a.posName,
          a.solName,
          a.success ? '' : a.feedback,
          a.timestamp ? new Date(a.timestamp).toLocaleString('zh-CN') : 'вҖ”'
        ]);
      });
    }
  }

  // Sheet 2: All attempts detail
  const detailData = [['з»„еҸ·', 'е°қиҜ•еәҸеҸ·', 'иҙҹжһҒжқҗж–ҷ', 'жӯЈжһҒжқҗж–ҷ', 'з”өи§ЈиҙЁжә¶ж¶І', 'з»“жһң', 'еҸҚйҰҲиҜҙжҳҺ', 'ж—¶й—ҙ']];

  for (let i = 1; i <= config.totalGroups; i++) {
    const data = getGroupData(i);
    data.attempts.forEach((a, idx) => {
      detailData.push([
        `з¬¬${i}з»„`,
        idx + 1,
        a.negName,
        a.posName,
        a.solName,
        a.success ? 'жҲҗеҠҹ' : 'еӨұиҙҘ',
        a.feedback,
        a.timestamp ? new Date(a.timestamp).toLocaleString('zh-CN') : 'вҖ”'
      ]);
    });
  }

  // Sheet 3: Statistics
  let started = 0, successCount = 0, failedCount = 0, totalAttempts = 0;
  for (let i = 1; i <= config.totalGroups; i++) {
    const data = getGroupData(i);
    if (data.attemptsUsed > 0) {
      started++;
      totalAttempts += data.attemptsUsed;
      if (data.success) successCount++;
      else if (data.attemptsUsed >= config.maxAttempts) failedCount++;
    }
  }

  const statsData = [
    ['з»ҹи®ЎйЎ№', 'ж•°еҖј'],
    ['жҖ»з»„ж•°', config.totalGroups],
    ['е·ІејҖе§Ӣз»„ж•°', started],
    ['жҲҗеҠҹз»„ж•°', successCount],
    ['еӨұиҙҘз»„ж•°пјҲз”Ёе°Ҫж¬Ўж•°пјү', failedCount],
    ['иҝӣиЎҢдёӯз»„ж•°', started - successCount - failedCount],
    ['жҲҗеҠҹзҺҮ', started > 0 ? (successCount / started * 100).toFixed(1) + '%' : 'вҖ”'],
    ['е№іеқҮе°қиҜ•ж¬Ўж•°', started > 0 ? (totalAttempts / started).toFixed(1) : 'вҖ”'],
    ['жҖ»е°қиҜ•ж¬Ўж•°', totalAttempts],
    ['жңҖеӨ§е…Ғи®ёе°қиҜ•ж¬Ўж•°', config.maxAttempts],
    ['еҶ·еҚҙж—¶й—ҙ(з§’)', config.cooldownSeconds],
    ['еҜјеҮәж—¶й—ҙ', new Date().toLocaleString('zh-CN')],
  ];

  // Create workbook
  const wb = XLSX.utils.book_new();

  const ws1 = XLSX.utils.aoa_to_sheet(summaryData);
  ws1['!cols'] = [{wch:8},{wch:14},{wch:12},{wch:10},{wch:8},{wch:12},{wch:12},{wch:14},{wch:50},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws1, 'еҗ„з»„жҖ»и§Ҳ');

  const ws2 = XLSX.utils.aoa_to_sheet(detailData);
  ws2['!cols'] = [{wch:8},{wch:10},{wch:12},{wch:12},{wch:14},{wch:8},{wch:50},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws2, 'иҜҰз»Ҷи®°еҪ•');

  const ws3 = XLSX.utils.aoa_to_sheet(statsData);
  ws3['!cols'] = [{wch:22},{wch:15}];
  XLSX.utils.book_append_sheet(wb, ws3, 'з»ҹи®Ўж•°жҚ®');

  // Download
  const now = new Date();
  const dateStr = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}`;
  XLSX.writeFile(wb, `еҺҹз”өжұ е®һйӘҢж•°жҚ®_${dateStr}.xlsx`);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ QUESTIONS в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function refreshQuestions() {
  const questions = JSON.parse(localStorage.getItem('galvanic_questions') || '[]');
  document.getElementById('qBadge').textContent = questions.length + ' жқЎ';
  const list = document.getElementById('questionsList');
  if (questions.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);font-size:.78rem;padding:.5rem">жҡӮж— еӯҰз”ҹжҸҗй—®</div>';
    return;
  }
  list.innerHTML = [...questions].reverse().map((q, i) => `
    <div style="display:flex;gap:.8rem;align-items:flex-start;padding:.6rem .8rem;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:8px;font-size:.78rem">
      <div style="flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(74,144,217,0.1);border:1px solid rgba(74,144,217,0.2);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#4a90d9">${questions.length-i}</div>
      <div style="flex:1;min-width:0">
        <div style="color:rgba(255,255,255,0.4);font-size:.68rem;margin-bottom:.2rem">
          <strong style="color:rgba(255,255,255,0.65)">${q.name}</strong>
          ${q.sid ? ' В· '+q.sid : ''}
          ${q.group ? ' В· '+q.group : ''}
          <span style="float:right">${q.timeStr || 'вҖ”'}</span>
        </div>
        <div style="color:rgba(255,255,255,0.7);line-height:1.5">${q.content}</div>
      </div>
    </div>
  `).join('');
}

function clearQuestions() {
  if (!confirm('зЎ®и®Өжё…йҷӨжүҖжңүеӯҰз”ҹжҸҗй—®пјҹ')) return;
  localStorage.removeItem('galvanic_questions');
  localStorage.setItem('galvanic_questions_update', Date.now().toString());
  if (useServer) fetch(API_BASE+'/api/questions',{method:'DELETE'}).catch(()=>{});
  refreshQuestions();
}

function exportQuestions() {
  const questions = JSON.parse(localStorage.getItem('galvanic_questions') || '[]');
  if (questions.length === 0) { alert('жҡӮж— жҸҗй—®ж•°жҚ®'); return; }
  const data = [['еәҸеҸ·','е§“еҗҚ','еӯҰеҸ·','з»„еҲ«','й—®йўҳеҶ…е®№','жҸҗй—®ж—¶й—ҙ']];
  questions.forEach((q, i) => {
    data.push([i+1, q.name, q.sid||'вҖ”', q.group||'вҖ”', q.content, q.timeStr||'вҖ”']);
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:6},{wch:10},{wch:12},{wch:8},{wch:50},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws, 'еӯҰз”ҹжҸҗй—®');
  const now = new Date();
  const dateStr = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}`;
  XLSX.writeFile(wb, `еӯҰз”ҹжҸҗй—®_${dateStr}.xlsx`);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ INIT в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
if (sessionStorage.getItem('_auth') === '1') { syncFromServer().then(() => { refreshDashboard(); refreshQuestions(); }); }
setInterval(async () => {
  if (sessionStorage.getItem('_auth') === '1') {
    await syncFromServer();
    refreshDashboard();
    refreshQuestions();
  }
}, 2000);
</script>
